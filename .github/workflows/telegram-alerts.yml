name: Telegram Daily Alerts

on:
  schedule:
    # All times UTC — SGT is UTC+8
    - cron: '5 0 * * *'   # 08:05 AM SGT
    - cron: '5 8 * * *'   # 04:05 PM SGT
    - cron: '5 16 * * *'  # 12:05 AM SGT (next day)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Telegram notification
        run: |
          echo "Calling: ${{ secrets.APP_URL }}/api/cron/daily"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/daily" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 90)
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: API returned HTTP $HTTP_STATUS"
            exit 1
          fi
